<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>College ERP - Fees</title><style>
:root{--bg-1:#e6d197;--bg-2:#e6d197;--bubble-1:rgba(196,233,255,.9);--bubble-2:rgba(214,221,255,.9);--glass:rgba(255,255,255,.58);--glass-border:rgba(255,255,255,.78);--text:#162e45;--sub:#546b7d;--nav:rgba(255,255,255,.52);--nav-hover:rgba(255,255,255,.75);--shadow:0 16px 40px rgba(26,58,98,.14);--ok:#1a9d72;--warn:#f1a532;}body[data-theme="dark"]{--bg-1:#472e94;--bg-2:#472e94;--bubble-1:rgba(44,108,151,.45);--bubble-2:rgba(72,84,176,.42);--glass:rgba(26,36,53,.58);--glass-border:rgba(175,198,255,.2);--text:#e8f1ff;--sub:#a4b4cf;--nav:rgba(22,31,46,.62);--nav-hover:rgba(161,186,255,.18);--shadow:0 20px 42px rgba(2,8,18,.45);--ok:#49cf9c;--warn:#ffc15e;}*{box-sizing:border-box;}body{margin:0;min-height:100vh;font-family:"Segoe UI","Helvetica Neue",sans-serif;color:var(--text);background:radial-gradient(circle at 16% 18%,var(--bubble-1),transparent 36%),radial-gradient(circle at 84% 12%,var(--bubble-2),transparent 38%),linear-gradient(135deg,var(--bg-1),var(--bg-2));display:grid;grid-template-columns:260px 1fr;}.sidebar{background:var(--nav);backdrop-filter:blur(14px);border-right:1px solid var(--glass-border);padding:22px 16px;display:flex;flex-direction:column;}.brand{font-size:1.12rem;font-weight:700;margin-bottom:18px;}.nav-link{color:var(--text);text-decoration:none;padding:10px 12px;border-radius:12px;margin-bottom:8px;border:1px solid transparent;background:var(--glass);}.nav-link:hover,.nav-link.active{background:var(--nav-hover);border-color:var(--glass-border);}.theme-toggle{margin-top:auto;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer;}main{padding:24px;}.glass{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;box-shadow:var(--shadow);backdrop-filter:blur(14px);padding:18px;margin-bottom:12px;}.top-strip{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;}.notice-line{display:flex;align-items:center;min-height:42px;color:var(--sub);}.notice-tag{margin-right:10px;border-radius:999px;padding:4px 8px;font-size:.74rem;font-weight:700;background:rgba(26,157,114,.14);} .notice-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;} .profile-wrap{position:relative;} .profile-btn{border:1px solid var(--glass-border);background:var(--glass);color:var(--text);border-radius:999px;padding:8px 12px 8px 8px;display:flex;align-items:center;gap:8px;cursor:pointer;} .avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;font-size:.8rem;font-weight:700;background:linear-gradient(135deg,rgba(43,120,255,.26),rgba(66,213,196,.24));border:1px solid var(--glass-border);} .role-menu{position:absolute;right:0;top:48px;min-width:170px;border:1px solid var(--glass-border);background:var(--glass);border-radius:14px;padding:8px;display:none;z-index:12;} .role-menu.open{display:block;} .role-item{width:100%;border:1px solid var(--glass-border);background:rgba(255,255,255,.2);color:var(--text);text-align:left;border-radius:10px;padding:8px 10px;cursor:pointer;margin-bottom:8px;} .role-item:last-child{margin-bottom:0;} .row{display:flex;justify-content:space-between;gap:8px;padding:10px 0;border-bottom:1px solid var(--glass-border);} .pill{font-size:.8rem;border-radius:999px;padding:3px 8px;} .ok{background:rgba(26,157,114,.15);color:var(--ok);} .warn{background:rgba(241,165,50,.18);color:var(--warn);} .muted{color:var(--sub);} @media (max-width:1050px){body{grid-template-columns:1fr;}.top-strip{grid-template-columns:1fr;}}
</style></head><body data-theme="light"><aside class="sidebar"><div class="brand">CampusERP</div><a class="nav-link" href="./home.html">Home</a><a class="nav-link" href="./timetable.html">Timetable</a><a class="nav-link active" href="./fees.html">Fees</a><a class="nav-link" href="./marks-records.html">Marks &amp; Records</a><a class="nav-link" href="./attendance.html">Attendance</a><a class="nav-link" href="./notices.html">Notices</a><a class="nav-link" href="./settings.html">Settings</a><button id="themeToggle" class="theme-toggle" type="button">Switch Theme</button></aside><main>
<section class="top-strip glass"><div class="notice-line"><span class="notice-tag">NOTICE</span><span id="noticeText" class="notice-text">Fee reminders and payment notices.</span></div><div class="profile-wrap"><button id="profileBtn" class="profile-btn" type="button"><span class="avatar">SN</span><span id="profileLabel">Student Name</span></button><div id="roleMenu" class="role-menu"><button class="role-item" data-role="Student">Student</button><button class="role-item" data-role="Teacher">Teacher</button><button class="role-item" data-role="Admin">Admin</button></div></div></section>
<section class="glass"><h2 style="margin:0;">Fees & Payments</h2><p class="muted">Track paid and pending fee components.</p></section><section class="glass"><div class="row"><span>Tuition Fee</span><span class="pill ok">Paid</span></div><div class="row"><span>Exam Fee</span><span class="pill warn">Due: $120</span></div><div class="row"><span>Library Fine</span><span class="pill warn">Due: $15</span></div><div class="row" style="border-bottom:none;"><strong>Total Outstanding</strong><strong>$135</strong></div></section></main>
<script>(function(){const tk='campus_theme',rk='campus_role';const b=document.getElementById('themeToggle');const pb=document.getElementById('profileBtn');const rm=document.getElementById('roleMenu');const pl=document.getElementById('profileLabel');const nt=document.getElementById('noticeText');const notices=['Online payment server is active now.','Late fee starts after March 5.','Scholarship verification is open today.'];let ni=0;function setRole(r){pl.textContent=r+' Name';localStorage.setItem(rk,r);}function sync(){b.textContent=document.body.getAttribute('data-theme')==='dark'?'Switch to White':'Switch to Dark';}document.body.setAttribute('data-theme',localStorage.getItem(tk)||'light');setRole(localStorage.getItem(rk)||'Student');sync();b.onclick=function(){const n=document.body.getAttribute('data-theme')==='dark'?'light':'dark';document.body.setAttribute('data-theme',n);localStorage.setItem(tk,n);sync();};pb.onclick=function(){rm.classList.toggle('open');};rm.onclick=function(e){const t=e.target;if(!(t instanceof HTMLElement))return;const r=t.getAttribute('data-role');if(!r)return;setRole(r);rm.classList.remove('open');};document.addEventListener('click',function(e){const t=e.target;if(!(t instanceof Node))return;if(!rm.contains(t)&&!pb.contains(t)){rm.classList.remove('open');}});setInterval(function(){ni=(ni+1)%notices.length;nt.textContent=notices[ni];},3800);})();</script>
</body></html>
