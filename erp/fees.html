<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College ERP - Fees</title>

<style>
:root{
  --bg1:#e6d197;
  --bg2:#eddcb0;
  --glass:rgba(255,255,255,.55);
  --glass-border:rgba(255,255,255,.8);
  --text:#162e45;
  --sub:#546b7d;
  --accent:#7f5a00;
  --shadow:0 18px 40px rgba(0,0,0,.15);
}

body[data-theme="dark"]{
  --bg1:#1a1730;
  --bg2:#2c2555;
  --glass:rgba(255,255,255,.08);
  --glass-border:rgba(255,255,255,.15);
  --text:#e8f1ff;
  --sub:#a4b4cf;
  --accent:#d6c3ff;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Segoe UI,sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at 15% 20%,rgba(255,255,255,.4),transparent 40%),
    linear-gradient(135deg,var(--bg1),var(--bg2));
}

/* IMPORTANT FIX */
main{
  padding:30px;
  display:flex;
  flex-direction:column;
  gap:25px;
  position:relative;
  z-index:1;
}

/* glass */
.glass{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:18px;
  box-shadow:var(--shadow);
  backdrop-filter:blur(14px);
  padding:20px;
}

/* top bar */
.top-strip{
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:relative;
  z-index:1000;
}

.profile-wrap{
  position:relative;
  z-index:2000;
}

.profile-btn{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:999px;
  padding:8px 16px;
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  font-weight:600;
}

.avatar{
  width:32px;
  height:32px;
  border-radius:50%;
  display:grid;
  place-items:center;
  background:var(--accent);
  color:white;
  font-size:.8rem;
}

/* dropdown */
.modern-sidebar{
  position:absolute;
  right:0;
  top:calc(100% + 8px);
  width:250px;

  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:16px;
  padding:15px;

  display:none;
  z-index:99999; /* 🔥 FIXED */

  box-shadow:0 30px 70px rgba(0,0,0,.35);

  opacity:0;
  transform:translateY(-10px);
  transition:.25s ease;
}

.modern-sidebar.open{
  display:block;
  opacity:1;
  transform:translateY(0);
}

/* arrow */
.modern-sidebar::before{
  content:"";
  position:absolute;
  top:-6px;
  right:20px;
  width:12px;
  height:12px;
  background:var(--glass);
  transform:rotate(45deg);
  border-left:1px solid var(--glass-border);
  border-top:1px solid var(--glass-border);
}

.menu-link{
  display:block;
  padding:10px 12px;
  margin-bottom:8px;
  border-radius:10px;
  text-decoration:none;
  font-weight:600;
  color:var(--text);
  background:rgba(0,0,0,.05);
  transition:.2s;
}

body[data-theme="dark"] .menu-link{
  background:rgba(255,255,255,.08);
}

.menu-link:hover{
  background:var(--accent);
  color:white;
  transform:translateX(4px);
}

.divider{
  height:1px;
  background:var(--glass-border);
  margin:12px 0;
}

/* fees */
.fee-row{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid var(--glass-border);
}

.fee-row:last-child{
  border-bottom:none;
}

.paid{color:green;font-weight:600;}
.due{color:red;font-weight:600;}

button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:var(--accent);
  color:white;
  margin-right:10px;
}
</style>
</head>

<body data-theme="light">

<main>

<!-- NAV -->
<section class="glass top-strip">
<div>
<strong>Fees & Payments</strong>
<div style="color:var(--sub)">Track paid and pending fees</div>
</div>

<div class="profile-wrap">
<button id="profileBtn" class="profile-btn">
<span class="avatar">SN</span>
Student Name
</button>

<div id="roleMenu" class="modern-sidebar">
<a href="home.html" class="menu-link">🏠 Home</a>
<a href="timetable.html" class="menu-link">📅 Timetable</a>
<a href="fees.html" class="menu-link">💳 Fees</a>
<a href="marks-records.html" class="menu-link">📊 Marks</a>
<a href="attendance.html" class="menu-link">📌 Attendance</a>
<a href="notices.html" class="menu-link">📢 Notices</a>
<a href="settings.html" class="menu-link">⚙ Settings</a>

<div class="divider"></div>

<a href="#" id="themeToggle" class="menu-link">🌙 Toggle Theme</a>
</div>
</div>
</section>

<!-- FEES -->
<section class="glass">

<div id="feePanel">

<div class="fee-row">
<span>Tuition Fee</span>
<span class="paid">Paid</span>
</div>

<div class="fee-row">
<span>Exam Fee</span>
<span class="due">$120 Due</span>
</div>

<div class="fee-row">
<span>Library Fine</span>
<span class="due">$15 Due</span>
</div>

<div class="fee-row">
<strong>Total Outstanding</strong>
<strong>$135</strong>
</div>

</div>

<br>

<button id="hideFees">Hide Fees</button>
<button id="showFees">Show Fees</button>

</section>

</main>

<script>
const profileBtn = document.getElementById("profileBtn");
const roleMenu = document.getElementById("roleMenu");
const themeToggle = document.getElementById("themeToggle");

// toggle dropdown
profileBtn.addEventListener("click", (e) => {
  e.stopPropagation();
  roleMenu.classList.toggle("open");
});

// prevent closing when clicking inside
roleMenu.addEventListener("click", (e) => {
  e.stopPropagation();
});

// close on outside click
document.addEventListener("click", () => {
  roleMenu.classList.remove("open");
});

// theme toggle
themeToggle.addEventListener("click", (e) => {
  e.preventDefault();
  const current = document.body.getAttribute("data-theme");
  document.body.setAttribute("data-theme", current === "dark" ? "light" : "dark");
});

// show/hide fees
document.getElementById("hideFees").onclick = () => {
  document.getElementById("feePanel").style.display = "none";
};

document.getElementById("showFees").onclick = () => {
  document.getElementById("feePanel").style.display = "block";
};
</script>

</body>
</html>
