<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>College ERP - उपस्थिति</title>
  <style>
    :root { --bg-1:#e6d197; --bg-2:#e6d197; --bubble-1:rgba(196,233,255,.9); --bubble-2:rgba(214,221,255,.9); --glass:rgba(255,255,255,.58); --glass-border:rgba(255,255,255,.78); --text:#162e45; --sub:#546b7d; --nav:rgba(255,255,255,.52); --nav-hover:rgba(255,255,255,.75); --shadow:0 16px 40px rgba(26,58,98,.14);} body[data-theme="dark"]{--bg-1:#472e94;--bg-2:#472e94;--bubble-1:rgba(44,108,151,.45);--bubble-2:rgba(72,84,176,.42);--glass:rgba(26,36,53,.58);--glass-border:rgba(175,198,255,.2);--text:#e8f1ff;--sub:#a4b4cf;--nav:rgba(22,31,46,.62);--nav-hover:rgba(161,186,255,.18);--shadow:0 20px 42px rgba(2,8,18,.45);} *{box-sizing:border-box;} body{margin:0;min-height:100vh;font-family:"Segoe UI","Helvetica Neue",sans-serif;color:var(--text);background:radial-gradient(circle at 16% 18%,var(--bubble-1),transparent 36%),radial-gradient(circle at 84% 12%,var(--bubble-2),transparent 38%),linear-gradient(135deg,var(--bg-1),var(--bg-2));display:grid;grid-template-columns:260px 1fr;} .sidebar{background:var(--nav);backdrop-filter:blur(14px);border-right:1px solid var(--glass-border);padding:22px 16px;display:flex;flex-direction:column;} .brand{font-size:1.12rem;font-weight:700;margin-bottom:18px;} .nav-link{color:var(--text);text-decoration:none;padding:10px 12px;border-radius:12px;margin-bottom:8px;} .nav-link:hover,.nav-link.active{background:var(--nav-hover);} .theme-toggle{margin-top:auto;border:1px solid var(--glass-border);background:var(--glass);color:var(--text);border-radius:12px;padding:10px 12px;cursor:pointer;} main{padding:24px;} .glass{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;box-shadow:var(--shadow);backdrop-filter:blur(14px);padding:18px;margin-bottom:12px;} .row{display:flex;justify-content:space-between;gap:8px;padding:10px 0;border-bottom:1px solid var(--glass-border);} .muted{color:var(--sub);} @media (max-width:1050px){body{grid-template-columns:1fr;}}
  </style>
</head>
<body data-theme="light">
  <aside class="sidebar">
    <div class="brand">CampusERP</div>
    <a class="nav-link" href="./home_hi.html">होम</a>
    <a class="nav-link" href="./timetable_hi.html">समय सारणी</a>
    <a class="nav-link" href="./fees_hi.html">शुल्क</a>
    <a class="nav-link" href="./marks-records.html">अंक &amp; Records</a>
    <a class="nav-link active" href="./attendance_hi.html">उपस्थिति</a>
    <a class="nav-link" href="./notices_hi.html">सूचनाएँ</a>
    <a class="nav-link" href="./settings_hi.html">सेटिंग्स</a>
    <button id="themeToggle" class="theme-toggle" type="button">थीम बदलें</button>
  </aside>
  <main>
    <section class="glass"><h2 style="margin:0;">उपस्थिति Details</h2><p class="muted">विषय-wise attendance summary.</p></section>
    <section class="glass">
      <div class="row"><span>Data Structures</span><strong>92%</strong></div>
      <div class="row"><span>Operating Systems</span><strong>85%</strong></div>
      <div class="row"><span>DBMS</span><strong>89%</strong></div>
      <div class="row"><span>Computer Networks</span><strong>86%</strong></div>
      <div class="row" style="border-bottom:none;"><strong>कुल</strong><strong>88%</strong></div>
    </section>
  </main>
  <script>
    (function () { const key="campus_theme"; const b=document.getElementById("themeToggle"); const s=localStorage.getItem(key)||"light"; document.body.setAttribute("data-theme",s); function l(){ b.textContent=document.body.getAttribute("data-theme")==="dark"?"लाइट मोड":"डार्क मोड";} b.addEventListener("click",function(){ const n=document.body.getAttribute("data-theme")==="dark"?"light":"dark"; document.body.setAttribute("data-theme",n); localStorage.setItem(key,n); l();}); l(); })();
  </script>
</body>
</html>
